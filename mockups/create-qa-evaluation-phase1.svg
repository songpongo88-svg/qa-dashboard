      .white{font-family:'Trebuchet MS',Verdana,sans-serif;fill:#fff}
      .small{font-size:18px}
      .xs{font-size:15px}
      .chip{fill:#f8fafc;stroke:#dbeafe;stroke-width:1.5}
      .field{fill:#fff;stroke:#d8ccff;stroke-width:1.5}
      .card{fill:#fff;stroke:#e5ddff;stroke-width:1.5;filter:url(#shadow)}
      .soft{fill:#fbfaff;stroke:#e8ddff;stroke-width:1.5}
