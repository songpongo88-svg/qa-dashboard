      <stop offset="0" stop-color="#fbf8ff"/>
      <stop offset="0.5" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17073b"/>
      <stop offset="0.5" stop-color="#4a1685"/>
      <stop offset="1" stop-color="#c026d3"/>
